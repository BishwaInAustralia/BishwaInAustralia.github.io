---
layout: default
---

<div class="page-wrap">

  <a class="back-link" href="/research/">Research</a>

  <article>
    <header class="article-header">
      <div class="article-kicker">Research</div>
      <h1>{{ page.title }}</h1>
      <div class="article-meta">
        {% if page.date %}
          <span class="article-date">{{ page.date | date: "%B %-d, %Y" }}</span>
        {% endif %}
        {% if page.tags %}
          {% for tag in page.tags %}
            <span class="article-tag">{{ tag }}</span>
          {% endfor %}
        {% endif %}
      </div>
    </header>

    <div class="research-body">
      {{ content }}
    </div>
  </article>

</div>
