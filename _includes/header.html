<header class="site-header">
  <div class="container">

    <!-- Logo -->
    <a href="/" class="logo">{{ site.title }}</a>

    <!-- Hamburger -->
    <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
      ☰
    </button>

    <!-- Navigation -->
    <nav class="nav" id="nav">
      <ul class="nav-list">
        {% for item in site.data.navigation.main %}
          <li class="nav-item {% if item.children %}has-child{% endif %}">
            
            <div class="nav-link">
              <a href="{{ item.url }}">{{ item.title }}</a>

              {% if item.children %}
                <button class="dropdown-toggle" aria-label="Open submenu">▾</button>
              {% endif %}
            </div>

            {% if item.children %}
              <ul class="dropdown">
                {% for child in item.children %}
                  <li><a href="{{ child.url }}">{{ child.title }}</a></li>
                {% endfor %}
              </ul>
            {% endif %}

          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
